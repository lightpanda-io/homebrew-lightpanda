name: Update Nightly Formula

on:
  schedule:
    - cron: "20 * * * *" # every hour, past 20 min. TODO we should have this triggered by the nightly build of the browser repo.
  workflow_dispatch:

jobs:
  nightly:
    name: Update nightly formula
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Compare release SHAs to formula
        id: versions
        run: |
          RELEASE=$(curl -sf "https://api.github.com/repos/lightpanda-io/browser/releases/tags/nightly")

          AARCH64_SHA=$(echo "$RELEASE" | jq -r '.assets[] | select(.name == "lightpanda-aarch64-macos") | .digest | sub("^sha256:"; "")')
          X86_SHA=$(echo "$RELEASE" | jq -r '.assets[] | select(.name == "lightpanda-x86_64-macos") | .digest | sub("^sha256:"; "")')

          OLD_AARCH64_SHA=$(grep -A1 'aarch64-macos"' Formula/lightpanda.rb | grep sha256 | sed 's/.*sha256 "\([^"]*\)".*/\1/')
          OLD_X86_SHA=$(grep -A1 'x86_64-macos"' Formula/lightpanda.rb | grep sha256 | sed 's/.*sha256 "\([^"]*\)".*/\1/')

          CURRENT=$(grep '^  version ' Formula/lightpanda.rb | sed 's/.*"\(.*\)".*/\1/')
          LATEST=$(echo "$RELEASE" | jq -r '.updated_at' | sed 's/-/./g; s/T/./; s/://g; s/Z$//')

          echo "Current: $CURRENT — Latest: $LATEST"
          echo "Current aarch64: $OLD_AARCH64_SHA — Latest: $AARCH64_SHA"
          echo "Current x86_64:  $OLD_X86_SHA — Latest: $X86_SHA"

          if [ "$AARCH64_SHA" = "$OLD_AARCH64_SHA" ] && [ "$X86_SHA" = "$OLD_X86_SHA" ]; then
            echo "Formula already up to date."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "aarch64_sha=$AARCH64_SHA" >> "$GITHUB_OUTPUT"
          echo "x86_sha=$X86_SHA" >> "$GITHUB_OUTPUT"
          echo "old_aarch64_sha=$OLD_AARCH64_SHA" >> "$GITHUB_OUTPUT"
          echo "old_x86_sha=$OLD_X86_SHA" >> "$GITHUB_OUTPUT"

      - name: Update nightly formula
        if: steps.versions.outputs.changed == 'true'
        env:
          LATEST: ${{ steps.versions.outputs.latest }}
          CURRENT: ${{ steps.versions.outputs.current }}
          AARCH64_SHA: ${{ steps.versions.outputs.aarch64_sha }}
          X86_SHA: ${{ steps.versions.outputs.x86_sha }}
          OLD_AARCH64_SHA: ${{ steps.versions.outputs.old_aarch64_sha }}
          OLD_X86_SHA: ${{ steps.versions.outputs.old_x86_sha }}
        run: |
          sed -i "s|version \"${CURRENT}\"|version \"${LATEST}\"|" Formula/lightpanda.rb
          sed -i "s|${OLD_AARCH64_SHA}|${AARCH64_SHA}|" Formula/lightpanda.rb
          sed -i "s|${OLD_X86_SHA}|${X86_SHA}|" Formula/lightpanda.rb

      - name: Open pull request
        if: steps.versions.outputs.changed == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "lightpanda Formula ${{ steps.versions.outputs.latest }}"
          branch: update/${{ steps.versions.outputs.latest }}
          title: "Update lightpanda Formula to ${{ steps.versions.outputs.latest }}"
          body: |
            Updates `lightpanda` Formula from `${{ steps.versions.outputs.current }}` to `${{ steps.versions.outputs.latest }}`.

            [Nightly release](https://github.com/lightpanda-io/browser/releases/tag/nightly)

      - name: Auto-merge pull request
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --merge ${{ steps.cpr.outputs.pull-request-number }}
